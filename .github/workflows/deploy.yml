name: Deploy Purchase Bill App

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────
  # 1. Validate that required secrets exist
  # ────────────────────────────────────────────────
  validate:
    name: 'Validate Configuration'
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ vars.BACKEND_URL }}

    steps:
      - name: Check required secrets
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          SQL_CONNECTION_STRING: ${{ secrets.SQL_CONNECTION_STRING }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          MISSING=""
          [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ] && MISSING="$MISSING\n  - AZURE_WEBAPP_PUBLISH_PROFILE"
          [ -z "$AZURE_STATIC_WEB_APPS_API_TOKEN" ] && MISSING="$MISSING\n  - AZURE_STATIC_WEB_APPS_API_TOKEN"
          [ -z "$SQL_CONNECTION_STRING" ] && MISSING="$MISSING\n  - SQL_CONNECTION_STRING"
          [ -z "$BACKEND_URL" ] && MISSING="$MISSING\n  - BACKEND_URL (GitHub Variable)"

          if [ -n "$MISSING" ]; then
            echo "❌ Missing secrets:$MISSING"
            echo ""
            echo "Set them in: GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets and variables are configured."

  # ────────────────────────────────────────────────
  # 2. Database - Initialize Schema
  # ────────────────────────────────────────────────
  database:
    name: 'Initialize Database Schema'
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sqlcmd
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y -qq mssql-tools unixodbc-dev
          echo '/opt/mssql-tools/bin' >> $GITHUB_PATH

      - name: Run Database Migration Script
        env:
          SQL_CONNECTION_STRING: ${{ secrets.SQL_CONNECTION_STRING }}
        run: |
          # Parse connection string parts
          SERVER=$(echo "$SQL_CONNECTION_STRING" | grep -oP 'Server=tcp:\K[^,]+')
          PORT=$(echo "$SQL_CONNECTION_STRING" | grep -oP ',\K\d+(?=;)' || echo "1433")
          DB=$(echo "$SQL_CONNECTION_STRING" | grep -oP 'Initial Catalog=\K[^;]+')
          USER=$(echo "$SQL_CONNECTION_STRING" | grep -oP 'User ID=\K[^;]+')
          PASS=$(echo "$SQL_CONNECTION_STRING" | grep -oP 'Password=\K[^;]+')

          echo "Running database migration on $SERVER..."
          until sqlcmd -S "$SERVER,$PORT" -U "$USER" -P "$PASS" -Q "SELECT 1" > /dev/null 2>&1; do
            echo "Waiting for SQL Server to be ready..."
            sleep 10
          done
          echo "SQL Server is ready. Applying schema..."
          sqlcmd -S "$SERVER,$PORT" -U "$USER" -P "$PASS" -d "$DB" -i database/init.sql
          echo "✅ Database schema applied successfully!"

      - name: Verify Tables
        env:
          SQL_CONNECTION_STRING: ${{ secrets.SQL_CONNECTION_STRING }}
        run: |
          SERVER=$(echo "$SQL_CONNECTION_STRING" | grep -oP 'Server=tcp:\K[^,]+')
          PORT=$(echo "$SQL_CONNECTION_STRING" | grep -oP ',\K\d+(?=;)' || echo "1433")
          DB=$(echo "$SQL_CONNECTION_STRING" | grep -oP 'Initial Catalog=\K[^;]+')
          USER=$(echo "$SQL_CONNECTION_STRING" | grep -oP 'User ID=\K[^;]+')
          PASS=$(echo "$SQL_CONNECTION_STRING" | grep -oP 'Password=\K[^;]+')
          sqlcmd -S "$SERVER,$PORT" -U "$USER" -P "$PASS" -d "$DB" \
            -Q "SELECT TABLE_NAME FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_SCHEMA='dbo'"

  # ────────────────────────────────────────────────
  # 3. Build & Deploy Backend (.NET API)
  # ────────────────────────────────────────────────
  backend:
    name: 'Build & Deploy Backend API'
    runs-on: ubuntu-latest
    needs: [validate, database]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: ./backend
        run: dotnet restore

      - name: Build (Release)
        working-directory: ./backend
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        working-directory: ./backend
        run: dotnet publish --configuration Release --no-build -o ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend/publish
          slot-name: production

  # ────────────────────────────────────────────────
  # 4. Build & Deploy Frontend (Angular)
  # ────────────────────────────────────────────────
  frontend:
    name: 'Build & Deploy Frontend'
    runs-on: ubuntu-latest
    needs: [validate, database, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Inject backend URL into environment
        working-directory: ./frontend
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          echo "Replacing __BACKEND_URL__ with $BACKEND_URL"
          sed -i "s|__BACKEND_URL__|${BACKEND_URL}|g" src/environments/environment.prod.ts

      - name: Build Angular app (Production)
        working-directory: ./frontend
        run: npx ng build --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          skip_api_build: true
          app_location: ./frontend/dist/purchase-bill-app

  # ────────────────────────────────────────────────
  # 5. Display Live URLs
  # ────────────────────────────────────────────────
  show-urls:
    name: 'Show Live URLs'
    runs-on: ubuntu-latest
    needs: [validate, frontend]
    if: always()

    steps:
      - name: Print Deployment URLs
        run: |
          echo "═══════════════════════════════════════════"
          echo "  ✅ Deployment Complete!"
          echo ""
          echo "  🖥️  Frontend (Live Demo):"
          echo "     https://\${{ vars.SWA_NAME }}.azureedge.net"
          echo ""
          echo "  ⚙️  Backend API:"
          echo "     ${{ vars.BACKEND_URL }}"
          echo ""
          echo "  📖 Swagger UI:"
          echo "     ${{ vars.BACKEND_URL }}/swagger"
          echo ""
          echo "  🗄️  Database: Azure SQL (provisioned via Terraform)"
          echo "═══════════════════════════════════════════"
