name: Deploy Purchase Bill App

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────
  # 1. Validate that required secrets exist
  # ────────────────────────────────────────────────
  validate:
    name: 'Validate Configuration'
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ vars.BACKEND_URL }}

    steps:
      - name: Check required secrets
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          SQL_CONNECTION_STRING: ${{ secrets.SQL_CONNECTION_STRING }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          MISSING=""
          [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ] && MISSING="$MISSING\n  - AZURE_WEBAPP_PUBLISH_PROFILE"
          [ -z "$AZURE_STATIC_WEB_APPS_API_TOKEN" ] && MISSING="$MISSING\n  - AZURE_STATIC_WEB_APPS_API_TOKEN"
          [ -z "$SQL_CONNECTION_STRING" ] && MISSING="$MISSING\n  - SQL_CONNECTION_STRING"
          [ -z "$BACKEND_URL" ] && MISSING="$MISSING\n  - BACKEND_URL (GitHub Variable)"

          if [ -n "$MISSING" ]; then
            echo "❌ Missing secrets:$MISSING"
            echo ""
            echo "Set them in: GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets and variables are configured."

  # ────────────────────────────────────────────────
  # 2. Database - Initialize Schema
  # ────────────────────────────────────────────────
  database:
    name: 'Initialize Database Schema'
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sqlcmd
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl -sSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y -qq mssql-tools unixodbc-dev
          echo '/opt/mssql-tools/bin' >> $GITHUB_PATH

      - name: Debug Connection String (safe)
        env:
          CS: ${{ secrets.SQL_CONNECTION_STRING }}
        run: |
          echo "Connection string length: ${#CS}"
          echo "First 30 chars: $(echo "$CS" | cut -c1-30)..."
          echo "Contains 'Server=': $(echo "$CS" | grep -i 'Server=' && echo YES || echo NO)"
          echo "Contains 'Initial Catalog=': $(echo "$CS" | grep -i 'Initial Catalog' && echo YES || echo NO)"
          echo "Contains 'User ID=': $(echo "$CS" | grep -i 'User ID' && echo YES || echo NO)"

      - name: Run Database Migration Script
        env:
          CS: ${{ secrets.SQL_CONNECTION_STRING }}
        run: |
          # Write connection string to a temp file to avoid pipe/shell issues
          echo "$CS" > /tmp/cs.txt

          get_val() {
            local key_name="$1"
            grep -io "$key_name=[^;]*" /tmp/cs.txt | head -1 | cut -d'=' -f2-
          }

          SERVER_RAW=$(get_val "Server")
          SERVER="${SERVER_RAW#tcp:}"
          PORT="${SERVER##*,}"
          SERVER="${SERVER%%,*}"
          [ -z "$PORT" ] && PORT="1433"
          DB=$(get_val "Initial Catalog")
          [ -z "$DB" ] && DB=$(get_val "Database")
          USER=$(get_val "User ID")
          [ -z "$USER" ] && USER=$(get_val "UID")
          PASS=$(get_val "Password")
          [ -z "$PASS" ] && PASS=$(get_val "PWD")

          echo "=== Database Connection Info ==="
          echo "Server: $SERVER"
          echo "Port: $PORT"
          echo "Database: $DB"
          echo "User: $USER"
          echo "Password length: ${#PASS}"
          echo "==============================="

          if [ -z "$SERVER" ] || [ -z "$DB" ] || [ -z "$USER" ] || [ -z "$PASS" ]; then
            echo "❌ Failed to parse connection string. Please check SQL_CONNECTION_STRING secret."
            echo "Raw server value: [$SERVER_RAW]"
            echo "Raw db value: [$(get_val "Initial Catalog")]"
            echo "Raw user value: [$(get_val "User ID")]"
            exit 1
          fi

          echo "Connecting to SQL Server..."
          for i in $(seq 1 15); do
            if sqlcmd -S "$SERVER,$PORT" -U "$USER" -P "$PASS" -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is ready!"
              break
            fi
            echo "Attempt $i: Waiting for SQL Server..."
            sleep 10
          done

          echo "Applying schema..."
          sqlcmd -S "$SERVER,$PORT" -U "$USER" -P "$PASS" -d "$DB" -i database/init.sql
          echo "✅ Database schema applied successfully!"

      - name: Verify Tables
        env:
          CS: ${{ secrets.SQL_CONNECTION_STRING }}
        run: |
          echo "$CS" > /tmp/cs.txt
          get_val() {
            grep -io "$1=[^;]*" /tmp/cs.txt | head -1 | cut -d'=' -f2-
          }

          SERVER_RAW=$(get_val "Server")
          SERVER="${SERVER_RAW#tcp:}"
          PORT="${SERVER##*,}"
          SERVER="${SERVER%%,*}"
          [ -z "$PORT" ] && PORT="1433"
          DB=$(get_val "Initial Catalog")
          [ -z "$DB" ] && DB=$(get_val "Database")
          USER=$(get_val "User ID")
          PASS=$(get_val "Password")

          sqlcmd -S "$SERVER,$PORT" -U "$USER" -P "$PASS" -d "$DB" \
            -Q "SELECT TABLE_NAME FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_SCHEMA='dbo'"

  # ────────────────────────────────────────────────
  # 3. Build & Deploy Backend (.NET API)
  # ────────────────────────────────────────────────
  backend:
    name: 'Build & Deploy Backend API'
    runs-on: ubuntu-latest
    needs: [validate, database]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: ./backend
        run: dotnet restore

      - name: Build (Release)
        working-directory: ./backend
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        working-directory: ./backend
        run: dotnet publish --configuration Release --no-build -o ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend/publish
          slot-name: production

  # ────────────────────────────────────────────────
  # 4. Build & Deploy Frontend (Angular)
  # ────────────────────────────────────────────────
  frontend:
    name: 'Build & Deploy Frontend'
    runs-on: ubuntu-latest
    needs: [validate, database, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Inject backend URL into environment
        working-directory: ./frontend
        run: |
          BACKEND_URL="${{ vars.BACKEND_URL }}"
          echo "Replacing __BACKEND_URL__ with $BACKEND_URL"
          sed -i "s|__BACKEND_URL__|${BACKEND_URL}|g" src/environments/environment.prod.ts

      - name: Build Angular app (Production)
        working-directory: ./frontend
        run: npx ng build --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          skip_api_build: true
          app_location: ./frontend/dist/purchase-bill-app

  # ────────────────────────────────────────────────
  # 5. Display Live URLs
  # ────────────────────────────────────────────────
  show-urls:
    name: 'Show Live URLs'
    runs-on: ubuntu-latest
    needs: [validate, frontend]
    if: always()

    steps:
      - name: Print Deployment URLs
        run: |
          echo "═══════════════════════════════════════════"
          echo "  ✅ Deployment Complete!"
          echo ""
          echo "  🖥️  Frontend (Live Demo):"
          echo "     https://\${{ vars.SWA_NAME }}.azureedge.net"
          echo ""
          echo "  ⚙️  Backend API:"
          echo "     ${{ vars.BACKEND_URL }}"
          echo ""
          echo "  📖 Swagger UI:"
          echo "     ${{ vars.BACKEND_URL }}/swagger"
          echo ""
          echo "  🗄️  Database: Azure SQL (provisioned via Terraform)"
          echo "═══════════════════════════════════════════"
